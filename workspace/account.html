    <!-- Apply saved theme/palette before first paint to prevent flash -->
    <script>
        (function(){
            var t=localStorage.getItem('theme'), p=localStorage.getItem('palette');
            if(t) document.documentElement.setAttribute('data-theme',t);
            else if(matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme','dark');
            if(p) document.documentElement.setAttribute('data-palette',p);
        })();
    </script>

            }

        window.addEventListener('resize', () => {
            if (!accIsMobile()) {

                e.preventDefault();
                document.querySelectorAll('#accountNav .nav-links a').forEach(l => l.classList.remove('active'));
